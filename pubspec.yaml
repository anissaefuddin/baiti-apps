name: catat_app
description: Room/guesthouse booking management for small accommodations.
version: 1.1.0+2  # versionName=1.1.0  versionCode=2
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Authentication
  google_sign_in: ^6.2.1

  # Networking
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2

  # OCR (Phase 2)
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.1.2

  # File I/O for CSV export
  path_provider: ^2.1.3
  share_plus: ^9.0.0

  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Calendar view
  table_calendar: ^3.1.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
